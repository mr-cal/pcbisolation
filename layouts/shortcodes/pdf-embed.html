{{/* Usage: {{< pdf-embed src="/path/to/file.pdf" height="600" >}} */}}
{{ $src := .Get "src" | safeURL }}
{{ $height := .Get "height" | default "600" }}
<div class="pdf-embed" style="margin:1.5rem 0;">
  <iframe src="{{ $src }}"
          width="100%"
          height="{{ $height }}px"
          style="border:1px solid #444;border-radius:4px;"
          loading="lazy">
    <p>Your browser does not support embedded PDFs.
       <a href="{{ $src }}">Download the PDF</a> instead.</p>
  </iframe>
</div>
