name: Build and publish Hugo site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install html2text
        run: pip install html2text

      - name: Validate content
        run: python3 scripts/validate_content.py

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.1"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Install htmlproofer
        run: sudo gem install html-proofer

      - name: Check links
        run: |
          htmlproofer public/ \
            --disable-external \
            --ignore-missing-alt \
            --allow-hash-href \
            --no-enforce-https
        continue-on-error: false

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Trigger vps-infra deploy
        uses: peter-evans/repository-dispatch@v3
        continue-on-error: true
        with:
          token: ${{ secrets.VPSINFRA_PAT }}
          repository: mr-cal/vps-infra
          event-type: pcbisolation-updated
